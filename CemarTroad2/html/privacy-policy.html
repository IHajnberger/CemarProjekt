    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit-icons.min.js"></script>
    <script>
        // Parsowanie parametrów URL w celu załadowania odpowiedniej maszyny
        const urlParams = new URLSearchParams(window.location.search);
        const machineId = urlParams.get('id') || 'E59008';
        const machineType = urlParams.get('type') || 'City';

        document.getElementById('p2-machine-number').innerText = machineId;
        document.getElementById('p2-machine-type').innerText = machineType;

        // Dynamiczna modyfikacja pól dla demonstracji
        if (machineId === 'E62441') {
            document.getElementById('p2-prod-date').innerText = '28.02.2025';
            document.getElementById('p2-hours').innerText = '890 mth';
            document.getElementById('p2-next-service').innerText = '110 mth';
            document.getElementById('p2-last-service').innerText = '12.03.2026';
        }

        function filterServices() {
            const query = document.getElementById('service-search-input').value.toLowerCase();
            const items = document.querySelectorAll('#services-accordion .service-item');
            items.forEach(item => {
                const name = item.querySelector('.service-name').innerText.toLowerCase();
                const date = item.querySelector('.service-date').innerText.toLowerCase();
                if (name.includes(query) || date.includes(query)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        function showContact() {
            UIkit.modal.dialog(`<div class="uk-modal-body"><h2 class="uk-text-bold">Kontakt Serwis</h2><p>Infolinia pilna: +48 123 456 789. Formularz zgłoszeniowy został aktywowany.</p></div>`);
        }
        function showPlaceholder(title) {
            UIkit.modal.dialog(`<div class="uk-modal-body"><h2 class="uk-text-bold">${title}</h2><p>Sekcja ${title} w przygotowaniu.</p></div>`);
        }
    </script>
