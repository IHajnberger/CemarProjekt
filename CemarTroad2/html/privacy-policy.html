    <script>

        // DYNAMICZNE PRZYPISYWANIE LINKÓW NA PODSTAWIE ROLI Z LOCALSTORAGE
        window.onload = function () {
            // Pobieramy rolę użytkownika (domyślnie 'client', jeśli brak zapisu)
            const userRole = localStorage.getItem('userRole') || 'client';

            // Decydujemy o adresie powrotnym
            const homeUrl = userRole === 'client' ? 'client-list.html' : 'staff-list.html';
            const KontoUrl = userRole === 'client' ? 'konto-kilent.html' : 'konto-serwis.html';

            // Dynamicznie aktualizujemy nawigację na stronie
            document.getElementById('nav-logo').href = homeUrl;
            document.getElementById('nav-home').href = homeUrl;


            // Dynamicznie aktualizujemy nawigację na stronie
            document.getElementById('nav-logo').href = homeUrl;
            document.getElementById('nav-home').href = homeUrl;
            document.getElementById('nav-konto').href = KontoUrl;

            if (userRole == 'client') {
                document.querySelector('.serwis').style.display = 'none';
                document.querySelector('.wycena').style.display = 'none';
            }
            function goBack() {
                window.location.href = Details;
            }

            if (userRole != 'client') {
                document.querySelector('.ai').style.display = 'none';
                document.querySelector('.instrukcja').style.display = 'none';
                document.querySelector('.pomoc').style.display = 'none';
            }
            const backBtn = document.getElementById('p7-back-btn');
            if (backBtn) {
                backBtn.onclick = function () {
                    window.location.href = Details;
                };
            }
        }

        function showContact() {

        }
        function showPlaceholder(title) {
            UIkit.modal.dialog(`<div class="uk-modal-body"><h2 class="uk-text-bold">${title}</h2><p>Sekcja ${title} w przygotowaniu.</p></div>`);
        }
    </script>
