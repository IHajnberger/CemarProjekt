<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMAR - Serwis Przeprowadzony</title>
    <!-- UIkit CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/css/uikit.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-yellow: #dca31a;
            --light-bg: #dfdfdf;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--light-bg);
            color: #333;
            min-height: 100vh;
        }
        h1, h2, h3, .uk-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
        .cemar-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        .yellow-accent-bar {
            height: 6px;
            background: var(--primary-yellow);
            border-radius: 12px 12px 0 0;
        }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .print-full { width: 100% !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body>

    <!-- Pasek nawigacyjny -->
    <nav class="uk-navbar-container bg-white border-b-2 border-amber-500 no-print" uk-navbar style="height: 80px;">
        <div class="uk-navbar-left uk-margin-left">
            <a class="uk-navbar-item uk-logo" href="staff-list.html">
                <img src="Logo.jpg" alt="Logo" style="max-height: 60px;">
            </a>
        </div>
        <div class="uk-navbar-right uk-margin-right">
            <ul class="uk-navbar-nav">
                <li><a href="serwis.html">Zacznij Nowy Serwis</a></li>
            </ul>
        </div>
    </nav>

    <div class="uk-container uk-margin-large-top uk-margin-large-bottom print-full">
        <div class="cemar-card">
            <div class="yellow-accent-bar"></div>
            <div class="p-8">
                
                <!-- Nagłówek Raportu -->
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-6 mb-6">
                    <div>
                        <span class="text-xs font-bold text-amber-600 uppercase tracking-widest">Karta Pracy Serwisowej</span>
                        <h1 class="text-3xl font-extrabold text-gray-900 mt-1">SERWIS ZAKOŃCZONY</h1>
                    </div>
                    <div class="text-left md:text-right mt-4 md:mt-0">
                        <p class="text-sm text-gray-500 m-0">Czas trwania prac:</p>
                        <h2 id="sum-duration" class="text-2xl font-bold text-amber-500 m-0">00:00:00</h2>
                    </div>
                </div>

                <!-- Szczegóły maszyny -->
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 bg-gray-50 p-6 rounded-lg mb-8">
                    <div>
                        <span class="block text-xs font-bold text-gray-400 uppercase">Model maszyny</span>
                        <span id="sum-model" class="font-bold text-gray-800">-</span>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-gray-400 uppercase">Numer maszyny</span>
                        <span id="sum-num" class="font-bold text-gray-800">-</span>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-gray-400 uppercase">Klient</span>
                        <span id="sum-client" class="font-bold text-gray-800">-</span>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-gray-400 uppercase">Roboczogodziny</span>
                        <span id="sum-hours" class="font-bold text-gray-800">- mth</span>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-gray-400 uppercase">Serwisant</span>
                        <span id="sum-tech" class="font-bold text-gray-800">-</span>
                    </div>
                    <div>
                        <span class="block text-xs font-bold text-gray-400 uppercase">Data wykonania</span>
                        <span id="sum-date" class="font-bold text-gray-800">-</span>
                    </div>
                </div>

                <!-- Przebieg oraz Części -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                    <div>
                        <h3 class="text-lg font-bold border-b pb-2 mb-3 text-gray-800">Wykonane Procedury</h3>
                        <ul id="sum-activities" class="list-disc pl-5 text-sm space-y-2 text-gray-700">
                            <!-- JS dynamic injection -->
                        </ul>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold border-b pb-2 mb-3 text-gray-800 font-mono text-amber-600">Wykorzystane Części</h3>
                        <ul id="sum-parts" class="list-none pl-0 text-sm space-y-2 text-gray-700">
                            <!-- JS dynamic injection -->
                        </ul>
                    </div>
                </div>

                <!-- Notatki końcowe -->
                <div class="border-t pt-6 mb-8">
                    <h3 class="text-lg font-bold text-gray-800 mb-2">Szczegółowy Opis Serwisu</h3>
                    <p id="sum-notes" class="text-sm text-gray-600 italic bg-gray-50 p-4 rounded border-l-4 border-amber-400 whitespace-pre-wrap">-</p>
                </div>

                <!-- Zdjęcia podsumowujące -->
                <div id="sum-photos-container" class="border-t pt-6 mb-8 hidden">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">Dokumentacja Wizualna</h3>
                    <div id="sum-photos" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </div>

                <!-- Akcje druku / powrotu -->
                <div class="flex gap-4 justify-end no-print">
                    <button class="bg-gray-800 hover:bg-gray-700 text-white font-bold px-6 py-3 rounded-lg flex items-center gap-2 transition" onclick="window.print()">
                        <span uk-icon="icon: print"></span> Drukuj Raport
                    </button>
                    <a href="serwis.html" class="bg-amber-500 hover:bg-amber-600 text-white font-bold px-6 py-3 rounded-lg flex items-center gap-2 transition">
                        Nowe zlecenie <span uk-icon="icon: arrow-right"></span>
                    </a>
                </div>

            </div>
        </div>
    </div>

    <!-- UIkit JS -->
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.17.11/dist/js/uikit-icons.min.js"></script>

    <script>
        window.onload = function() {
            const rawData = localStorage.getItem('cemar_active_summary');
            if(!rawData) {
                alert("Brak danych do wygenerowania podsumowania.");
                return;
            }

            const data = JSON.parse(rawData);

            // Wypełnianie pól tekstowych
            document.getElementById('sum-duration').textContent = data.duration;
            document.getElementById('sum-model').textContent = data.model;
            document.getElementById('sum-num').textContent = data.machineNum || '---';
            document.getElementById('sum-client').textContent = data.client || '---';
            document.getElementById('sum-hours').textContent = data.hours ? `${data.hours} mth` : '---';
            document.getElementById('sum-tech').textContent = data.technician || '---';
            document.getElementById('sum-date').textContent = data.date;
            document.getElementById('sum-notes').textContent = data.notes || "Brak uwag.";

            // Czynności
            const actList = document.getElementById('sum-activities');
            actList.innerHTML = '';
            if(data.activities && data.activities.length > 0) {
                data.activities.forEach(act => {
                    const li = document.createElement('li');
                    li.textContent = act;
                    actList.appendChild(li);
                });
            } else {
                actList.innerHTML = '<li class="text-gray-400">Nie wybrano żadnych czynności.</li>';
            }

            // Części
            const partsList = document.getElementById('sum-parts');
            partsList.innerHTML = '';
            if(data.parts && data.parts.length > 0) {
                data.parts.forEach(part => {
                    const li = document.createElement('li');
                    li.className = "flex items-center gap-2";
                    li.innerHTML = `
                        <span class="font-mono bg-amber-100 text-amber-800 px-2 py-0.5 rounded text-xs">${part.code}</span>
                        <span>${part.name}</span>
                    `;
                    partsList.appendChild(li);
                });
            } else {
                partsList.innerHTML = '<li class="text-gray-400">Brak użytych części zamiennych.</li>';
            }

            // Zdjęcia
            if(data.photos && data.photos.length > 0) {
                document.getElementById('sum-photos-container').classList.remove('hidden');
                const photoGrid = document.getElementById('sum-photos');
                photoGrid.innerHTML = '';
                data.photos.forEach(imgSrc => {
                    const img = document.createElement('img');
                    img.src = imgSrc;
                    img.className = "w-full h-32 object-cover rounded-lg border";
                    photoGrid.appendChild(img);
                });
            }
        };
    </script>
</body>
</html>
